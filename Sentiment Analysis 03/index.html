<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sentiment Analysis</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #ede0f7;
      --white: #f9f4fe;
      --border: #d9c8ee;
      --border-dark: #c2a8e0;
      --text: #2d1a4a;
      --muted: #8a6aaa;
      --subtle: #e4d5f5;
      --positive: #276845;
      --positive-bg: #d6f0e3;
      --negative: #a32525;
      --negative-bg: #fad5d5;
      --neutral-color: #6b4e00;
      --neutral-bg: #fdf3d0;
      --btn-bg: #7c3aed;
      --btn-hover: #6d28d9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 100px;
      transition: background 0.6s ease;
    }

    body.result-positive { background: #d4edda; }
    body.result-negative { background: #fadadd; }
    body.result-neutral  { background: var(--bg); }

    .container { width: 100%; max-width: 660px; }

    header {
      margin-bottom: 44px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 28px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(34px, 7vw, 58px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    h1 em { font-style: italic; color: var(--muted); }

    /* Loading progress */
    .load-progress { margin-bottom: 18px; display: none; }
    .load-progress.visible { display: block; }
    .load-progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .load-bar-bg { width: 100%; height: 4px; background: var(--subtle); border-radius: 99px; overflow: hidden; }
    .load-bar-fill { height: 100%; background: var(--btn-bg); border-radius: 99px; width: 0%; transition: width 0.3s ease; }

    /* Status */
    .status-bar {
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; color: var(--muted);
      margin-bottom: 24px; padding: 10px 14px;
      background: var(--white); border: 1px solid var(--border); border-radius: 8px;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-dark); flex-shrink: 0; animation: pulse 2s infinite; }
    .status-dot.ready   { background: #27ae60; animation: none; }
    .status-dot.loading { background: #9b59b6; }
    .status-dot.error   { background: #e74c3c; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Input */
    .input-section { margin-bottom: 24px; }
    .input-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; font-weight: 500; }
    textarea {
      width: 100%; background: var(--white); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
      line-height: 1.65; font-weight: 300; padding: 18px 20px; resize: vertical;
      min-height: 130px; outline: none; border-radius: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea::placeholder { color: #c0aadd; }
    textarea:focus { border-color: var(--btn-bg); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }

    .input-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .char-count { font-size: 11px; color: var(--muted); }
    .btn-row { display: flex; gap: 10px; }

    button {
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 500; cursor: pointer; border: none;
      padding: 10px 26px; border-radius: 8px; transition: all 0.18s;
    }
    .btn-primary { background: var(--btn-bg); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--btn-hover); box-shadow: 0 3px 10px rgba(109,40,217,0.3); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-reset {
      background: var(--btn-bg);
      color: #fff;
      opacity: 0.85;
    }
    .btn-reset:hover { background: var(--btn-hover); opacity: 1; }

    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-dark); color: var(--text); }

    /* Result */
    .result-section { display: none; animation: fadeUp 0.35s ease; margin-bottom: 20px; }
    .result-section.visible { display: block; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .result-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 12px; padding: 30px;
      transition: border-color 0.4s;
    }
    .result-card.positive { border-top: 3px solid var(--positive); }
    .result-card.negative { border-top: 3px solid var(--negative); }
    .result-card.neutral  { border-top: 3px solid #a07800; }

    .result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 26px; }
    .result-meta-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .sentiment-label { font-family: 'DM Serif Display', serif; font-size: 38px; font-weight: 400; letter-spacing: -0.5px; line-height: 1; }
    .sentiment-label.positive { color: var(--positive); }
    .sentiment-label.negative { color: var(--negative); }
    .sentiment-label.neutral  { color: #a07800; }
    .sentiment-emoji { font-size: 42px; }

    /* Score bars */
    .scores { display: flex; flex-direction: column; gap: 14px; margin-bottom: 26px; }
    .score-row { display: flex; flex-direction: column; gap: 6px; }
    .score-meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: 500; color: var(--muted); }
    .score-bar-bg { width: 100%; height: 6px; background: var(--subtle); border-radius: 99px; overflow: hidden; }
    .score-bar-fill { height: 100%; width: 0%; border-radius: 99px; transition: width 0.85s cubic-bezier(0.16,1,0.3,1); }
    .score-bar-fill.positive { background: var(--positive); }
    .score-bar-fill.negative { background: var(--negative); }
    .score-bar-fill.neutral  { background: #a07800; }

    /* Confidence */
    .confidence-box {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg);
    }
    .ring-wrap { position: relative; width: 58px; height: 58px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text); }
    .confidence-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .confidence-text strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 2px; font-weight: 600; }

    /* Reset row */
    .reset-row { display: flex; justify-content: flex-end; margin-top: 16px; }

    /* History */
    .history-section { margin-top: 36px; }
    .section-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 12px; font-weight: 500; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item { display: flex; align-items: center; gap: 12px; padding: 11px 15px; background: var(--white); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .history-item:hover { border-color: var(--border-dark); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .history-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .history-dot.positive { background: var(--positive); }
    .history-dot.negative { background: var(--negative); }
    .history-dot.neutral  { background: #a07800; }
    .history-text { font-size: 13px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-badge { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
    .history-badge.positive { color: var(--positive); background: var(--positive-bg); }
    .history-badge.negative { color: var(--negative); background: var(--negative-bg); }
    .history-badge.neutral  { color: #6b4e00; background: var(--neutral-bg); }

    .spinner { display: inline-block; width: 11px; height: 11px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Sentiment<br/><em>Analysis</em></h1>
  </header>

  <div class="load-progress" id="loadProgress">
    <div class="load-progress-label">
      <span id="loadLabel">Downloading model weights...</span>
      <span id="loadPct">0%</span>
    </div>
    <div class="load-bar-bg"><div class="load-bar-fill" id="loadBar"></div></div>
  </div>

  <div class="status-bar">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">Loading model — first download ~30 MB, cached after...</span>
  </div>

  <div class="input-section">
    <label class="input-label" for="inputText">Your text</label>
    <textarea id="inputText" placeholder="Type or paste any text here..." maxlength="2000"></textarea>
    <div class="input-footer">
      <span class="char-count"><span id="charCount">0</span> / 2000</span>
      <div class="btn-row">
        <button class="btn-ghost" onclick="clearAll()">Clear</button>
        <button class="btn-primary" id="analyzeBtn" onclick="analyzeSentiment()" disabled>Analyze</button>
      </div>
    </div>
  </div>

  <!-- Result card -->
  <div class="result-section" id="resultSection">
    <div class="result-card" id="resultCard">
      <div class="result-header">
        <div>
          <div class="result-meta-label">Detected Sentiment</div>
          <div class="sentiment-label" id="sentimentLabel">—</div>
        </div>
        <div class="sentiment-emoji" id="sentimentEmoji">—</div>
      </div>

      <div class="scores">
        <div class="score-row">
          <div class="score-meta"><span style="color:var(--positive)">Positive</span><span id="posScore">—</span></div>
          <div class="score-bar-bg"><div class="score-bar-fill positive" id="posBar"></div></div>
        </div>
        <div class="score-row">
          <div class="score-meta"><span style="color:var(--negative)">Negative</span><span id="negScore">—</span></div>
          <div class="score-bar-bg"><div class="score-bar-fill negative" id="negBar"></div></div>
        </div>
        <div class="score-row">
          <div class="score-meta"><span style="color:#a07800">Neutral</span><span id="neuScore">—</span></div>
          <div class="score-bar-bg"><div class="score-bar-fill neutral" id="neuBar"></div></div>
        </div>
      </div>

      <div class="confidence-box">
        <div class="ring-wrap">
          <svg viewBox="0 0 64 64" width="58" height="58">
            <circle cx="32" cy="32" r="26" fill="none" stroke="#ddd" stroke-width="6"/>
            <circle cx="32" cy="32" r="26" fill="none" stroke="#7c3aed" stroke-width="6"
              stroke-dasharray="163.36" stroke-dashoffset="163.36" stroke-linecap="round" id="confidenceRing"/>
          </svg>
          <div class="ring-center" id="confidencePct">0%</div>
        </div>
        <div class="confidence-text">
          <strong>Confidence</strong>
          Model's certainty about the predicted sentiment class.
        </div>
      </div>
    </div>

    <!-- Reset button below card -->
    <div class="reset-row">
      <button class="btn-reset" onclick="resetAll()">↺ Reset</button>
    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none;">
    <div class="section-title">Recent</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';
env.allowLocalModels = false;

const MODEL = 'Xenova/twitter-roberta-base-sentiment-latest';
let classifier = null;
let history    = [];

const statusDot    = document.getElementById('statusDot');
const statusText   = document.getElementById('statusText');
const analyzeBtn   = document.getElementById('analyzeBtn');
const inputText    = document.getElementById('inputText');
const loadProgress = document.getElementById('loadProgress');
const loadBar      = document.getElementById('loadBar');
const loadLabel    = document.getElementById('loadLabel');
const loadPct      = document.getElementById('loadPct');

function setStatus(state, msg) {
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = msg;
}

async function loadModel() {
  try {
    loadProgress.classList.add('visible');
    classifier = await pipeline('sentiment-analysis', MODEL, {
      progress_callback: (p) => {
        if (p.status === 'downloading' && p.total > 0) {
          const pct = Math.round((p.loaded / p.total) * 100);
          loadBar.style.width = pct + '%';
          loadLabel.textContent = 'Downloading model...';
          loadPct.textContent = pct + '%';
        }
        if (p.status === 'done') { loadBar.style.width = '100%'; loadPct.textContent = '100%'; }
      }
    });
    setTimeout(() => loadProgress.classList.remove('visible'), 800);
    setStatus('ready', 'Model ready — analyze any text');
    analyzeBtn.disabled = false;
  } catch (err) {
    setStatus('error', 'Load failed: ' + err.message);
  }
}

window.analyzeSentiment = async function () {
  const text = inputText.value.trim();
  if (!text) return;
  if (!classifier) { alert('Model still loading — please wait.'); return; }

  analyzeBtn.disabled = true;
  analyzeBtn.innerHTML = '<span class="spinner"></span>';
  setStatus('loading', 'Analyzing...');

  try {
    const results = await classifier(text, { topk: 3 });
    let pPos = 0, pNeg = 0, pNeu = 0;
    for (const r of results) {
      const lbl = r.label.toLowerCase();
      if (lbl === 'positive')      pPos = r.score;
      else if (lbl === 'negative') pNeg = r.score;
      else if (lbl === 'neutral')  pNeu = r.score;
    }

    let cls;
    if (pPos >= pNeg && pPos >= pNeu)      cls = 'positive';
    else if (pNeg >= pPos && pNeg >= pNeu) cls = 'negative';
    else                                   cls = 'neutral';

    const confidence = cls === 'positive' ? pPos : cls === 'negative' ? pNeg : pNeu;

    renderResult(cls, pPos, pNeg, pNeu, confidence);
    setBodyBg(cls);
    addHistory(text, cls);
    setStatus('ready', 'Analysis complete');
  } catch (err) {
    setStatus('error', 'Error: ' + err.message);
  }

  analyzeBtn.disabled = false;
  analyzeBtn.textContent = 'Analyze';
};

function setBodyBg(cls) {
  document.body.className = cls === 'positive' ? 'result-positive'
    : cls === 'negative' ? 'result-negative'
    : 'result-neutral';
}

function renderResult(cls, pPos, pNeg, pNeu, confidence) {
  const labels = { positive: 'Positive', negative: 'Negative', neutral: 'Neutral' };
  const emojis = { positive: '😊', negative: '😞', neutral: '😐' };

  document.getElementById('resultCard').className = 'result-card ' + cls;
  const lbl = document.getElementById('sentimentLabel');
  lbl.textContent = labels[cls];
  lbl.className   = 'sentiment-label ' + cls;
  document.getElementById('sentimentEmoji').textContent = emojis[cls];

  setScore('pos', pPos);
  setScore('neg', pNeg);
  setScore('neu', pNeu);

  const ring = document.getElementById('confidenceRing');
  ring.style.strokeDashoffset = 163.36 * (1 - confidence);
  ring.style.stroke = cls === 'positive' ? '#276845'
    : cls === 'negative' ? '#a32525' : '#a07800';
  document.getElementById('confidencePct').textContent = Math.round(confidence * 100) + '%';

  document.getElementById('resultSection').className = 'result-section visible';
  requestAnimationFrame(() => {
    document.getElementById('posBar').style.width = (pPos * 100) + '%';
    document.getElementById('negBar').style.width = (pNeg * 100) + '%';
    document.getElementById('neuBar').style.width = (pNeu * 100) + '%';
  });
}

function setScore(id, val) {
  document.getElementById(id + 'Score').textContent = (val * 100).toFixed(1) + '%';
}

window.resetAll = function () {
  inputText.value = '';
  document.getElementById('charCount').textContent = '0';
  document.getElementById('resultSection').className = 'result-section';
  document.body.className = '';
  ['pos','neg','neu'].forEach(id => { document.getElementById(id + 'Bar').style.width = '0%'; });
  setStatus('ready', 'Model ready — analyze any text');
};

window.clearAll = function () {
  inputText.value = '';
  document.getElementById('charCount').textContent = '0';
};

function addHistory(text, cls) {
  history.unshift({ text, cls });
  if (history.length > 6) history.pop();
  document.getElementById('historySection').style.display = 'block';
  document.getElementById('historyList').innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="history-dot ${h.cls}"></div>
      <div class="history-text">${esc(h.text)}</div>
      <div class="history-badge ${h.cls}">${h.cls}</div>
    </div>`).join('');
}

window.loadHistory = (i) => {
  inputText.value = history[i].text;
  document.getElementById('charCount').textContent = history[i].text.length;
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

inputText.addEventListener('input', () => {
  document.getElementById('charCount').textContent = inputText.value.length;
});

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadModel();
</script>
</body>
</html>
